<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BugTracker - Login</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <h1>BugTracker</h1>
            <p class="login-subtitle">Sistema de seguimiento de defectos</p>

            <form id="login-form">
                <div class="form-group">
                    <label for="username">Usuario</label>
                    <input type="text" id="username" name="username" placeholder="Ingresa tu usuario" autocomplete="off">
                    <span class="field-error" id="username-error"></span>
                </div>
                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" name="password" placeholder="Ingresa tu contraseña">
                    <span class="field-error" id="password-error"></span>
                </div>
                <div class="error-message" id="login-error"></div>
                <button type="submit" id="login-btn" class="btn btn-primary btn-block">Iniciar Sesion</button>
            </form>

            <div class="login-help">
                <p>Usuarios de prueba:</p>
                <small>admin / admin123</small><br>
                <small>tester / tester123</small><br>
                <small>dev / dev123</small>
            </div>
        </div>
    </div>

    <script src="js/auth.js"></script>
</body>
</html>
